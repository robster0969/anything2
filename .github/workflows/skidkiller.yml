# .github/workflows/skidkiller.yml
name: Skid Killer Swarm
permissions:
  contents: write
  pull-requests: write
  actions: write

on:
  push:
    paths:
      - 'trigger.json'
  workflow_dispatch:

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Parse trigger.json and build matrix
        id: set
        run: |
          THREADS=$(jq '.threads' trigger.json)
          echo "Detected threads: $THREADS"
          MATRIX=$(seq 1 $THREADS | jq -R . | jq -cs '{runner: .}')
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  execute-a:
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
      max-parallel: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Launch attack A
        run: |
          python skidkiller.py || true
        env:
          RUNNER_MODE: 1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  execute-b:
    needs: build-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
      max-parallel: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Launch attack B
        run: |
          python skidkiller.py || true
        env:
          RUNNER_MODE: 1
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
